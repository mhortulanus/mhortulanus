name: Guestbook

on:
  issues:
    types: [opened]

permissions:
  contents: write
  issues: write

jobs:
  add-visitor:
    if: github.event.issue.title == 'guestbook'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Update guestbook
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            const user = context.payload.issue.user.login;
            const avatarUrl = `https://avatars.githubusercontent.com/${user}`;
            const profileUrl = `https://github.com/${user}`;
            const maxVisitors = 30;

            let readme = fs.readFileSync('README.md', 'utf8');

            const startMarker = '<!-- VISITORS:START -->';
            const endMarker = '<!-- VISITORS:END -->';
            const startIdx = readme.indexOf(startMarker);
            const endIdx = readme.indexOf(endMarker);

            if (startIdx === -1 || endIdx === -1) {
              core.setFailed('Missing VISITORS markers in README.md');
              return;
            }

            const existingBlock = readme.substring(startIdx + startMarker.length, endIdx);
            const existingUsers = [...existingBlock.matchAll(/alt="@([^"]+)"/g)].map(m => m[1]);

            if (existingUsers.includes(user)) {
              console.log(`@${user} already in guestbook, skipping.`);
              return;
            }

            const newAvatar = `<a href="${profileUrl}" title="@${user}"><img src="${avatarUrl}" alt="@${user}" width="50" height="50" style="border-radius:50%;" /></a>`;

            const avatarRegex = /<a href="https:\/\/github\.com\/[^"]+[\s\S]*?<\/a>/g;
            let avatars = [...existingBlock.matchAll(avatarRegex)].map(m => m[0]);
            avatars = [newAvatar, ...avatars].slice(0, maxVisitors);

            const newBlock = '\n' + avatars.join('\n') + '\n';
            readme = readme.substring(0, startIdx + startMarker.length) + newBlock + readme.substring(endIdx);

            fs.writeFileSync('README.md', readme);
            console.log(`Added @${user} to guestbook.`);

      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --cached --quiet || git commit -m "visitor: @${{ github.event.issue.user.login }}"
          git push

      - name: Close issue
        uses: peter-evans/close-issue@v3
        with:
          issue-number: ${{ github.event.issue.number }}
          comment: "Added to the wall! Thanks for dropping by, @${{ github.event.issue.user.login }}"
